version: 2

models:
  - name: stg_aqi_hourly
    description: Raw AQI forecasts landed by the Python extract job and lightly standardized in dbt.
    columns:
      - name: forecast_timestamp_local
        description: Local Bangkok forecast timestamp from the source API.
        tests:
          - not_null
      - name: ingest_time_utc
        description: UTC timestamp for when the raw extract landed.
        tests:
          - not_null
      - name: source_system
        description: Upstream system name set by the extract job.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["open-meteo"]
      - name: raw_file_name
        description: Raw parquet object path that produced this staged row.
        tests:
          - not_null

  - name: stg_weather_hourly
    description: Hourly weather forecasts landed for downstream AQI enrichment.
    columns:
      - name: forecast_timestamp_local
        tests:
          - not_null
      - name: ingest_time_utc
        tests:
          - not_null
      - name: source_system
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["open-meteo-weather"]
      - name: raw_file_name
        tests:
          - not_null

  - name: fct_aqi_hourly
    description: Latest available AQI forecast for each forecast hour after deduplicating repeated extracts.
    columns:
      - name: record_key
        tests:
          - not_null
          - unique
      - name: forecast_timestamp_local
        tests:
          - not_null
          - unique
      - name: last_ingested_at_utc
        tests:
          - not_null
      - name: temperature_c
        tests:
          - not_null
      - name: relative_humidity
        tests:
          - not_null
      - name: wind_speed_kph
        tests:
          - not_null
