services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB:-airflow}
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:-airflow}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_POSTGRES_USER:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    environment:
      AQI_LATITUDE: ${AQI_LATITUDE:-13.75}
      AQI_LONGITUDE: ${AQI_LONGITUDE:-100.5}
      AQI_TIMEZONE: ${AQI_TIMEZONE:-Asia/Bangkok}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_STORAGE_CONTAINER_NAME: ${AZURE_STORAGE_CONTAINER_NAME:-aqi-data}
      BANGKOK_AQI_REPO_ROOT: /opt/airflow/project
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@postgres/${AIRFLOW_POSTGRES_DB:-airflow}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      DBT_DUCKDB_PATH: /opt/airflow/project/warehouse/bangkok_aqi.duckdb
      DBT_RAW_AQI_GLOB: /opt/airflow/project/data/raw/aqi/**/*.json
      DBT_RAW_WEATHER_GLOB: /opt/airflow/project/data/raw/weather/**/*.json
      PYTHONPATH: /opt/airflow/project/src
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./:/opt/airflow/project
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --role Admin \
          --username "${AIRFLOW_ADMIN_USERNAME:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Admin \
          --lastname User \
          --email admin@example.com || true
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    environment:
      AQI_LATITUDE: ${AQI_LATITUDE:-13.75}
      AQI_LONGITUDE: ${AQI_LONGITUDE:-100.5}
      AQI_TIMEZONE: ${AQI_TIMEZONE:-Asia/Bangkok}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_STORAGE_CONTAINER_NAME: ${AZURE_STORAGE_CONTAINER_NAME:-aqi-data}
      BANGKOK_AQI_REPO_ROOT: /opt/airflow/project
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@postgres/${AIRFLOW_POSTGRES_DB:-airflow}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      DBT_DUCKDB_PATH: /opt/airflow/project/warehouse/bangkok_aqi.duckdb
      DBT_RAW_AQI_GLOB: /opt/airflow/project/data/raw/aqi/**/*.json
      DBT_RAW_WEATHER_GLOB: /opt/airflow/project/data/raw/weather/**/*.json
      PYTHONPATH: /opt/airflow/project/src
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./:/opt/airflow/project
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    environment:
      AQI_LATITUDE: ${AQI_LATITUDE:-13.75}
      AQI_LONGITUDE: ${AQI_LONGITUDE:-100.5}
      AQI_TIMEZONE: ${AQI_TIMEZONE:-Asia/Bangkok}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_STORAGE_CONTAINER_NAME: ${AZURE_STORAGE_CONTAINER_NAME:-aqi-data}
      BANGKOK_AQI_REPO_ROOT: /opt/airflow/project
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@postgres/${AIRFLOW_POSTGRES_DB:-airflow}
      DBT_DUCKDB_PATH: /opt/airflow/project/warehouse/bangkok_aqi.duckdb
      DBT_RAW_AQI_GLOB: /opt/airflow/project/data/raw/aqi/**/*.json
      DBT_RAW_WEATHER_GLOB: /opt/airflow/project/data/raw/weather/**/*.json
      PYTHONPATH: /opt/airflow/project/src
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./:/opt/airflow/project
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume:
